<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <!-- Gradient for energy theme -->
    <linearGradient id="energyGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a365d;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2d3748;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3182ce;stop-opacity:1" />
    </linearGradient>

    <!-- Gold gradient for accent -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffb347;stop-opacity:1" />
    </linearGradient>

    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
  </defs>

  <!-- Background rectangle for better visibility -->
  <rect width="400" height="120" fill="transparent"/>

  <!-- Energy bolt icon -->
  <g transform="translate(20, 35)">
    <!-- Lightning bolt -->
    <path d="M0,20 L8,20 L4,32 L16,0 L12,12 L20,12 Z"
          fill="url(#goldGradient)"
          filter="url(#shadow)">
      <animate attributeName="opacity" values="1;0.7;1" dur="2s" repeatCount="indefinite"/>
    </path>

    <!-- Energy sparks -->
    <circle cx="6" cy="8" r="1.5" fill="#ffd700" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.3;0.8" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="14" cy="6" r="1" fill="#ffd700" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="1.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Company name -->
  <text x="60" y="40" font-family="Arial, sans-serif" font-size="18" font-weight="800"
        fill="url(#energyGradient)" filter="url(#shadow)">
    Amara Raja Energy &amp; Mobility Ltd
  </text>

  <!-- Laboratory name -->
  <text x="60" y="65" font-family="Arial, sans-serif" font-size="16" font-weight="600"
        fill="url(#goldGradient)" filter="url(#shadow)" letter-spacing="1" text-transform="uppercase">
    BEMAL
  </text>

  <!-- Tagline -->
  <text x="60" y="85" font-family="Arial, sans-serif" font-size="8" font-weight="400"
        fill="#e2e8f0" letter-spacing="0.5" text-transform="uppercase" opacity="0.9">
    Battery Evaluation &amp; Material Analytical Laboratory
  </text>

  <!-- Decorative line -->
  <line x1="60" y1="92" x2="220" y2="92" stroke="url(#goldGradient)" stroke-width="1" opacity="0.5"/>
</svg>
